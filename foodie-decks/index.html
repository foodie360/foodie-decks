<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foodie, Restaurant Marketing Agency</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f8f7f4;
    color: #1a1a18;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .wrap {
    text-align: center;
    padding: 2rem;
  }

  .logo {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #aaa;
    margin-bottom: 1.5rem;
  }

  h1 {
    font-size: 28px;
    font-weight: 400;
    color: #1a1a18;
    margin-bottom: 0.75rem;
    letter-spacing: -0.02em;
  }

  p {
    font-size: 15px;
    color: #888;
    line-height: 1.6;
    max-width: 340px;
    margin: 0 auto 2.5rem;
  }

  a {
    display: inline-block;
    font-size: 13px;
    color: #1D9E75;
    text-decoration: none;
    border-bottom: 0.5px solid #1D9E75;
    padding-bottom: 1px;
    transition: opacity 0.15s;
  }

  a:hover { opacity: 0.65; }

  .dot {
    width: 6px;
    height: 6px;
    background: #1D9E75;
    border-radius: 50%;
    margin: 0 auto 2rem;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">Foodie, Restaurant Marketing Agency</div>
  <div class="dot"></div>
  <h1>This link is for your eyes only.</h1>
  <p>If you received a link from us, it should include the full URL. Contact us if you think something is missing.</p>
  <a href="https://foodie.agency" target="_blank">foodie.agency</a>
</div>
</body>
</html>
